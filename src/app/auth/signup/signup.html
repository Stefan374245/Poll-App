<section class="auth-page" aria-label="Quick Signup">
  <article class="auth-card">
    <h1>Join PollApp</h1>
    <p class="auth-subtitle">Create your account in seconds ⚡</p>

    <form (ngSubmit)="onQuickSignup()" #signupForm="ngForm" novalidate>
      <!-- Name Input -->
      <div class="form-group">
        <label for="displayName">
          Your Name <span class="required" aria-label="required">*</span>
        </label>
        <input
          id="displayName"
          type="text"
          name="displayName"
          [(ngModel)]="displayName"
          required
          minlength="2"
          placeholder="Enter your name"
          autocomplete="name"
          aria-required="true"
          [disabled]="isLoading()"
        />
        <p class="form-hint">A unique avatar will be generated for you automatically</p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-btn"
        [disabled]="signupForm.invalid || isLoading()">
        @if (isLoading()) {
          <app-spinner />
        } @else {
          <span>Create Account 🎉</span>
        }
      </button>

      <p class="alt-action">
        Already joined?
        <a routerLink="/login">Login here</a>
      </p>
    </form>
  </article>
</section>
