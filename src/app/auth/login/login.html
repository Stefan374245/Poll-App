<section class="auth-page" aria-label="Login">
  <article class="auth-card">
    <h1>Login</h1>
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="email">
          E-Mail <span class="required" aria-label="required">*</span>
        </label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          autocomplete="email"
          aria-required="true"
        />
      </div>
      <div class="form-group">
        <label for="password">
          Password <span class="required" aria-label="required">*</span>
        </label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          autocomplete="current-password"
          aria-required="true"
        />
      </div>
      <button type="submit" [disabled]="loginForm.invalid">Login</button>
      <p class="alt-action">
        Don't have an account?
        <a routerLink="/signup">Sign up</a>
      </p>
      <button type="button" class="guest-btn" (click)="onGuestLogin()">
        Continue as Guest
      </button>
    </form>
  </article>
</section>
