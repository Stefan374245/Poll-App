<section class="auth-page" aria-label="Quick Login">
  <article class="auth-card">
    <h1>Join PollApp</h1>
    <p class="auth-subtitle">Enter your name to get started ✨</p>

    <form (ngSubmit)="onQuickLogin()" #loginForm="ngForm" novalidate>
      <!-- Name Input -->
      <div class="form-group">
        <label for="displayName">
          Your Name <span class="required" aria-label="required">*</span>
        </label>
        <input
          id="displayName"
          type="text"
          name="displayName"
          [(ngModel)]="displayName"
          required
          minlength="2"
          placeholder="Enter your name"
          autocomplete="name"
          aria-required="true"
          [disabled]="isLoading()"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-btn"
        [disabled]="loginForm.invalid || isLoading()">
        @if (isLoading()) {
          <app-spinner />
        } @else {
          <span>Let's Go! 🚀</span>
        }
      </button>
    </form>
  </article>
</section>
