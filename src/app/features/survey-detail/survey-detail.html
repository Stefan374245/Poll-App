@if (loading()) {
  <div class="detail__loading">
    <p>Loading survey...</p>
  </div>
} @else if (survey(); as s) {
  <article class="detail" aria-label="Survey detail">

    <!-- Survey Header: Status, Deadline, Category -->
    <app-survey-header
      [status]="surveyStatus()"
      [deadline]="s.deadline"
      [category]="s.category"
      [createdAt]="s.createdAt"
    />

    <!-- Toggle Results View Button -->
    @if (canViewResults()) {
      <div class="detail__toggle">
        <app-btn
          variant="secondary"
          [label]="showResultsView() ? 'Back to Voting' : 'Show Results'"
          (click)="toggleResultsView()"
        />
      </div>
    }

    <!-- Survey Content: Questions + Results -->
    <app-survey-content [layoutMode]="contentLayout()">
      <!-- Questions Panel -->
      <div questions>
        <app-survey-questions-panel
          [title]="s.title"
          [description]="s.description"
          [questions]="s.questions"
          [selections]="selections()"
          [canSubmit]="canSubmit()"
          [hasVoted]="hasVoted()"
          [isActive]="s.isActive"
          (selectionChange)="onSelectionChange($event)"
          (submit)="submitVotes()"
        />
      </div>

      <!-- Results Panel -->
      <div results>
        <app-survey-results-panel
          [questionsWithResults]="questionsWithResults()"
          [isLive]="s.isActive"
          [showResults]="canViewResults()"
        />
      </div>
    </app-survey-content>

  </article>
} @else {
  <p class="detail__not-found">Survey not found.</p>
}
