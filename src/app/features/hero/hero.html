<section class="hero" aria-label="Welcome banner">
  <div class="hero__content">
    <!-- Text side -->
    <div class="hero__text">
      <h1 class="hero__title">Collect Feedback,<br />Unlock Ideas</h1>
      <p class="hero__subtitle">
        Create and share surveys in minutes – from team events to
        workplace culture. Collect opinions, engage your audience,
        and turn feedback into action.
      </p>
      <a routerLink="/create">
        <app-btn variant="primary" icon="add" label="New survey" />
      </a>
    </div>

    <div class="hero__visual" aria-hidden="true">
      <div class="hero__notes">
        <img src="images/note/note3.svg" alt="" class="hero__note hero__note--1" />
        <img src="images/svgs_for_visual/question_mark.svg" alt="" class="hero__question" />
        <img src="images/svgs_for_visual/typing_bubble.svg" alt="" class="hero__typing" />
        <img src="images/svgs_for_visual/check.svg" alt="" class="hero__check" />
        <img src="images/svgs_for_visual/star.svg" alt="" class="hero__star" />
      </div>
    </div>
  </div>
</section>
